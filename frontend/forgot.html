<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Reset password — CampusCart</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="auth-shell">
  <div class="auth-art">
    <a href="index.html" class="brand"><span class="brand-mark"></span> CampusCart</a>
    <div>
      <h2>Forgot your <span class="gradient-text">password?</span></h2>
      <p style="color:var(--ink-dim);margin-top:18px;max-width:380px;line-height:1.6">No worries. We'll send a secure reset link to your college email — clickable in seconds.</p>
    </div>
    <div class="quote">
      <p>Tip: Always use your verified college email so we can keep your account safe.</p>
    </div>
  </div>
  <div class="auth-form-wrap">
    <form class="auth-form">
      <h1>Reset password</h1>
      <p class="sub">Enter your email and we'll send a reset link.</p>
      <div class="field"><label>College email</label><input type="email" placeholder="you@university.edu" required /></div>
      <button class="btn btn-primary" type="submit">Send reset link →</button>
      <div class="alt">Remembered it? <a href="login.html">Back to sign in</a></div>
    </form>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
